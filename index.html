  <title>Japonais - JLPT Quest</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;

    }

      width: min(680px, calc(100vw - 32px));

      box-shadow: 0 20px 50px rgba(0,0,0,.32);

    h1 { margin: 0 0 10px; font-size: clamp(1.7rem, 4vw, 2.6rem); line-height: 1.04; }
    p { margin: 0; color: #aec0d5; }
    a { color: #77d8d1; }

    <h1>JLPT Quest</h1>
